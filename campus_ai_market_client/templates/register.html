{% extends "base.html" %}

{% block title %}注册 - 校园AI交易市场{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2 class="auth-title">注册</h2>
        <div id="alertBox"></div>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="请输入密码（至少6位）">
            </div>
            <div class="form-group">
                <label for="email">邮箱（选填）</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label for="phone">手机号（选填）</label>
                <input type="tel" id="phone" name="phone" placeholder="请输入手机号">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">注册</button>
        </form>
        <div class="form-footer">
            <p>已有账号？<a href="{{ url_for('login') }}">立即登录</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value
    };

    if (formData.password.length < 6) {
        showAlert('密码至少6位', 'error');
        return;
    }

    try {
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData)
        });
        const data = await response.json();

        if (response.ok) {
            showAlert('注册成功！正在跳转...', 'success');
            setTimeout(() => window.location.href = '/login', 1000);
        } else {
            showAlert(data.error, 'error');
        }
    } catch (error) {
        showAlert('注册失败，请重试', 'error');
    }
});

function showAlert(message, type) {
    const alertBox = document.getElementById('alertBox');
    alertBox.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
}
</script>
{% endblock %}
