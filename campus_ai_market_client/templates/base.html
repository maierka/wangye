<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}校园AI交易市场{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="{{ url_for('index') }}" class="navbar-brand">
                🏠 校园AI交易市场
            </a>
            <div class="navbar-nav">
                <a href="{{ url_for('index') }}" class="nav-link">首页</a>
                <a href="{{ url_for('publish') }}" class="nav-link">发布商品</a>
                <a href="{{ url_for('my_favorites') }}" class="nav-link">我的收藏</a>
            </div>
            <div class="navbar-auth">
                {% if session.get('user_id') %}
                    <a href="{{ url_for('profile', user_id=session.get('user_id')) }}" class="nav-link">
                        👤 {{ session.get('username') }}
                    </a>
                    <a href="{{ url_for('publish') }}" class="btn btn-secondary" id="logoutBtn">退出</a>
                {% else %}
                    <a href="{{ url_for('login') }}" class="btn btn-secondary">登录</a>
                    <a href="{{ url_for('register') }}" class="btn btn-primary">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="footer">
        <p>&copy; 2024 校园AI交易市场 - 让校园二手交易更简单</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
